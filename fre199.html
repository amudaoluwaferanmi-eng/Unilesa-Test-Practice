<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNILESA CBT – FRE 199</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.container{
  max-width:700px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.question{
  font-weight:bold;
  margin-bottom:15px;
}

.option{
  display:block;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
  margin-top:8px;
  cursor:pointer;
}

.option:hover{
  background:#f1f1f1;
}

.nav-buttons{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.prev-btn{
  background:#ccc;
}

.next-btn{
  background:#2e7d32;
  color:white;
}

.number-panel{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
  margin-bottom:20px;
}

.number-btn{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#ddd;
  cursor:pointer;
  font-weight:bold;
}

.number-btn.answered{
  background:#81c784;
  color:white;
}

.number-btn.active{
  background:#1b5e20;
  color:white;
}

.submit-btn{
  background:#1b5e20;
  color:white;
  width:100%;
  margin-top:20px;
}

.correct{
  background:#d4f7dc;
  border-left:5px solid green;
}

.wrong{
  background:#ffd6d6;
  border-left:5px solid red;
}

.hidden{
  display:none;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#888;
  margin:20px 0;
}
</style>
</head>

<body>

<div class="header">
  <div>FRE 199 – Basic French</div>
  <div>Practice Questions</div>
</div>

<div class="container" id="quizPage">

  <div id="numberPanel" class="number-panel"></div>

  <div id="questionBox"></div>
  <div id="optionsBox"></div>

  <div class="nav-buttons">
    <button class="prev-btn" onclick="prevQuestion()">Previous</button>
    <button class="next-btn" onclick="nextQuestion()">Next</button>
  </div>

  <button class="submit-btn" onclick="submitQuiz()">Submit Exam</button>
</div>

<div class="container hidden" id="resultPage">
  <h2>Exam Completed</h2>
  <h3 id="score"></h3>
  <button class="submit-btn" onclick="showCorrections()">View Corrections</button>
</div>

<div class="container hidden" id="correctionPage">
  <h2>Corrections</h2>
  <div id="corrections"></div>
</div>

<div class="footer">
  Developed by Oluwaferanmi || Physiology Department
</div>

<script>
const questions = [
  {q:"Which French word means “Good morning”?", o:["Bonsoir","Bonne nuit","Bonjour","Salut"], a:2},
  {q:"“Salut” is best described as a ______ greeting.", o:["Formal","Religious","Informal","Professional"], a:2},
  {q:"Which greeting is used on the phone?", o:["Bonjour","Salut","Allô","Bonsoir"], a:2},
  {q:"“Bonne nuit” is said when someone is ______.", o:["Eating","Leaving class","Going to sleep","Arriving"], a:2},
  {q:"Which greeting means “Good evening”?", o:["Bonjour","Bonsoir","Salut","Allô"], a:1},
  {q:"“Enchanté(e)” means ______.", o:["Welcome","Goodbye","Nice to meet you","Good luck"], a:2},
  {q:"“À bientôt” means ______.", o:["Goodbye forever","See you soon","See you tomorrow","Good night"], a:1},
  {q:"Which is a polite way to say goodbye?", o:["Salut","Ciao","Au revoir","À après"], a:2},
  {q:"“Ça fait longtemps !” means ______.", o:["How are you?","Long time no see","Goodbye","What’s new?"], a:1},
  {q:"“Merci beaucoup” means ______.", o:["Please","Thank you","Thank you very much","Welcome"], a:2},
  {q:"“Bienvenue” means ______.", o:["Hello","Goodbye","Welcome","Sorry"], a:2},
  {q:"“Comment allez-vous ?” is ______.", o:["Informal","Formal","Incorrect","Plural only"], a:1},
  {q:"“Quoi de neuf ?” means ______.", o:["What’s new?","How are you?","Where are you?","Goodbye"], a:0},
  {q:"“Adieu” expresses a ______ goodbye.", o:["Casual","Temporary","Very final","Friendly"], a:2},
  {q:"“Bonne journée” means ______.", o:["Good night","Have a nice day","See you","Welcome"], a:1},
  {q:"“Tu vas bien ?” is ______.", o:["Formal","Informal","Plural","Past tense"], a:1},
  {q:"“Je vais bien” means ______.", o:["I am sick","I am fine","I am tired","I am late"], a:1},
  {q:"“Pas mal” means ______.", o:["Very good","Bad","Not bad","Terrible"], a:2},
  {q:"“À demain” means ______.", o:["See you later","See you tomorrow","Goodbye","See you soon"], a:1},
  {q:"“À bientôt” means ______.", o:["Never","See you soon","Tomorrow","Tonight"], a:1},
  {q:"“Dors bien” is said before ______.", o:["Eating","Sleeping","Studying","Working"], a:1},
  {q:"“Écrivez” means ______.", o:["Speak","Write","Listen","Stop"], a:1},
  {q:"“Regardez le tableau” means ______.", o:["Look at the board","Clean the board","Close the board","Carry the board"], a:0},
  {q:"Three (3) in French is ______.", o:["Deux","Quatre","Trois","Cinq"], a:2},
  {q:"Nine (9) in French is ______.", o:["Neuf","Huit","Onze","Cinq"], a:0},
  {q:"Thousand (1000) in French is ______.", o:["Cent","Million","Mille","Deux cent"], a:2},
  {q:"The last day of the week is ______.", o:["Samedi","Vendredi","Dimanche","Jeudi"], a:2},
  {q:"February in French is ______.", o:["Janvier","Mars","Avril","Février"], a:3},
  {q:"“Demain” means ______.", o:["Tomorrow","Morning","Today","Yesterday"], a:0},
  {q:"“Toujours” means ______.", o:["Tomorrow","Always","Never","Sometimes"], a:1},
];

let currentQuestion = 0;
let answers = [];

function loadQuestion(index){
  const q = questions[index];

  document.getElementById("questionBox").innerHTML =
    `<div class="question">${index+1}. ${q.q}</div>`;

  let optionsHTML = "";
  q.o.forEach((opt,i)=>{
    optionsHTML += `
      <label class="option">
        <input type="radio" name="option" value="${i}"
        ${answers[index] === i ? "checked" : ""}>
        ${opt}
      </label>
    `;
  });

  document.getElementById("optionsBox").innerHTML = optionsHTML;

  updatePanel();
}

function saveAnswer(){
  const selected = document.querySelector('input[name="option"]:checked');
  if(selected){
    answers[currentQuestion] = Number(selected.value);
  }
}

function nextQuestion(){
  saveAnswer();
  if(currentQuestion < questions.length-1){
    currentQuestion++;
    loadQuestion(currentQuestion);
  }
}

function prevQuestion(){
  saveAnswer();
  if(currentQuestion > 0){
    currentQuestion--;
    loadQuestion(currentQuestion);
  }
}

function updatePanel(){
  buildNumberPanel();
}

function buildNumberPanel(){
  const panel = document.getElementById("numberPanel");
  panel.innerHTML = "";

  questions.forEach((_,i)=>{
    const btn = document.createElement("button");
    btn.innerText = i+1;
    btn.classList.add("number-btn");

    if(answers[i] !== undefined){
      btn.classList.add("answered");
    }

    if(i === currentQuestion){
      btn.classList.add("active");
    }

    btn.onclick = function(){
      saveAnswer();
      currentQuestion = i;
      loadQuestion(currentQuestion);
      updatePanel();
    };

    panel.appendChild(btn);
  });
}

function submitQuiz(){
  saveAnswer();
  let score = 0;

  questions.forEach((q,i)=>{
    if(answers[i] === q.a){
      score++;
    }
  });

  document.getElementById("quizPage").classList.add("hidden");
  document.getElementById("resultPage").classList.remove("hidden");
  document.getElementById("score").innerText =
    "Your Score: " + score + " / " + questions.length;
}

function showCorrections(){
  document.getElementById("resultPage").classList.add("hidden");
  document.getElementById("correctionPage").classList.remove("hidden");

  const cDiv = document.getElementById("corrections");
  cDiv.innerHTML = "";

  questions.forEach((q,i)=>{
    let html = `<div class="question">${i+1}. ${q.q}</div>`;

    q.o.forEach((opt,idx)=>{
      if(idx === q.a){
        html += `<div class="option correct">${opt} ✓</div>`;
      }else if(idx === answers[i]){
        html += `<div class="option wrong">${opt} ✗</div>`;
      }else{
        html += `<div class="option">${opt}</div>`;
      }
    });

    cDiv.innerHTML += html;
  });
}

buildNumberPanel();
loadQuestion(0);
</script>

</body>
</html>
